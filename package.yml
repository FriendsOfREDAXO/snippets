package: snippets
version: '1.4.2'
author: REDAXO Community
supportpage: https://github.com/FriendsOfREDAXO/snippets

page:
    title: 'Snippets'
    icon: rex-icon fa-code
    perm: snippets[]
    subpages:
        overview:
            title: 'translate:snippets_overview'
            icon: rex-icon fa-list
            perm: snippets[]
        translations:
            title: 'translate:snippets_tstr_nav'
            icon: rex-icon fa-language
            perm: snippets[translate]
        edit:
            title: 'translate:snippets_edit'
            icon: rex-icon fa-pencil
            perm: snippets[admin|editor]
            hidden: true
        html_replacement:
            title: 'translate:snippets_html_replacements'
            icon: rex-icon fa-exchange
            perm: snippets[admin]
            subpages:
                overview:
                    title: 'translate:snippets_html_replacement_overview'
                edit:
                    title: 'translate:snippets_html_replacement_edit_title'
                    hidden: true
        categories:
            title: 'translate:snippets_categories'
            icon: rex-icon fa-folder-open
            perm: snippets[admin]
        settings:
            title: 'translate:snippets_settings'
            icon: rex-icon fa-cogs
            perm: snippets[admin]
            itemClass: pull-right
        import_export:
            title: 'translate:snippets_import_export'
            icon: rex-icon fa-download
            perm: snippets[admin]
            itemClass: pull-right
        help:
            title: 'translate:snippets_help'
            icon: rex-icon fa-question-circle
            subPath: README.md
            itemClass: pull-right
            perm: snippets[]

requires:
    redaxo: ^5.20.0
    php:
        version: ^8.4

suggests:
    sprog: 'Für Abkürzungen-Feature'
